<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Download Print Swap</title>
    <meta name="description" content="Swap gallery-quality prints with photographers you admire. Download Print Swap on the App Store.">
    <link rel="canonical" href="https://print-swap.com/get">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://print-swap.com/get">
    <meta property="og:title" content="Download Print Swap">
    <meta property="og:description" content="Swap gallery-quality prints with photographers you admire.">
    <meta property="og:image" content="https://print-swap.com/get/assets/hero-card-1.jpg">
    <meta property="og:site_name" content="Print Swap">
    <meta property="og:locale" content="en_GB">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Download Print Swap">
    <meta name="twitter:description" content="Swap gallery-quality prints with photographers you admire.">
    <meta name="twitter:image" content="https://print-swap.com/get/assets/hero-card-1.jpg">

    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quattrocento+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/get/style.css?v=20260425-appstore-badge">
</head>
<body>
    <main class="get-page" aria-labelledby="get-heading">
        <img class="get-logo" src="/assets/logo.svg" alt="Print Swap" width="96" height="96">

        <img
            class="get-hero"
            src="/get/assets/hero-card-1.jpg"
            alt=""
            width="1024"
            height="1024"
            decoding="async"
            fetchpriority="high">

        <section class="get-content">
            <h1 id="get-heading">Swap prints with photographers you admire</h1>
            <p class="get-intro">Print Swap connects photographers to exchange gallery-quality prints of their work.</p>
            <a
                class="get-cta"
                href="https://apps.apple.com/us/app/print-swap/id6752863046"
                data-cta="appstore_click"
                data-cta-location="get_page">
                <img
                    class="get-cta-badge"
                    src="/get/assets/app-store-badge.png"
                    alt="Download on the App Store"
                    width="236"
                    height="70">
            </a>
            <p class="get-deadline">Upload your work by 1 May for a chance to be part of the Print Swap Launch Show, 7 May.</p>
        </section>
    </main>
</body>
</html>
